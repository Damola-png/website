    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" filter="url(#n)"/>
  <circle cx="260" cy="220" r="140" fill="rgba(255,255,255,0.12)"/>
  <circle cx="980" cy="590" r="220" fill="rgba(255,255,255,0.08)"/>
